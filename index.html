<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Earth Three.js</title>
    <meta
      name="description"
      content="A clean standalone Three.js Earth renderer with cinematic atmosphere, cloud layer, shadow, and rotation."
    />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="modulepreload" href="./earth-three.js" />
    <link rel="modulepreload" href="./vendor/three.module.js" />
    <link rel="preload" as="image" href="./assets/earth/earth_day_4k.jpg" crossorigin="anonymous" />
    <link rel="preload" as="image" href="./assets/earth/earth_atmos_2048.jpg" crossorigin="anonymous" />
    <link rel="preload" as="image" href="./assets/earth/earth_webgl_clouds_2048.png" crossorigin="anonymous" />
    <link rel="preload" as="image" href="./assets/earth/earth_lights_2048.png" crossorigin="anonymous" />
    <link rel="preload" as="image" href="./assets/earth/react-earth-lite/earth-normal.webp" crossorigin="anonymous" />
    <link rel="preload" as="image" href="./assets/earth/react-earth-lite/earth-specular.webp" crossorigin="anonymous" />
    <style>
      :root {
        color-scheme: dark;
        background: #020202;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 50%, rgba(24, 88, 150, 0.14), transparent 44%),
          #020202;
      }

      body[data-bg="light"] {
        background:
          radial-gradient(circle at 50% 50%, rgba(31, 91, 146, 0.06), transparent 45%),
          #fff;
      }

      body {
        display: grid;
        place-items: center;
      }

      .stage {
        display: grid;
        width: 100vw;
        height: 100svh;
        place-items: center;
      }

      .orb {
        position: relative;
        width: min(99vw, 99svh);
        height: min(99vw, 99svh);
      }

      .orb canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .orb::after {
        position: absolute;
        inset: 4.8%;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 26%, rgba(255, 255, 255, 0.018), transparent 25%);
        content: "";
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .fallback {
        position: fixed;
        left: 50%;
        top: 50%;
        display: none;
        width: min(320px, calc(100vw - 48px));
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.72);
        font:
          14px/1.7 ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-align: center;
      }

      body[data-bg="light"] .fallback {
        color: rgba(13, 23, 38, 0.68);
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="Earth preview">
      <div class="orb" data-earth-globe>
        <canvas data-earth-canvas></canvas>
      </div>
    </main>

    <p class="fallback" data-fallback>当前浏览器不支持 WebGL，无法显示 Three.js 地球。</p>

    <script type="module">
      import { createHeroEarth, EARTH_TUNING_PRESET } from "./earth-three.js";

      const params = new URLSearchParams(window.location.search);
      if (params.get("bg") === "light") {
        document.body.dataset.bg = "light";
      }

      const tuningKeys = Object.keys(EARTH_TUNING_PRESET);
      const settings = tuningKeys.reduce((nextSettings, key) => {
        const rawValue = params.get(key);
        if (rawValue === null) {
          return nextSettings;
        }

        if (typeof EARTH_TUNING_PRESET[key] === "number") {
          const value = Number(rawValue);
          if (Number.isFinite(value)) {
            nextSettings[key] = value;
          }
        } else if (rawValue) {
          nextSettings[key] = rawValue;
        }

        return nextSettings;
      }, {});

      const reducedMotion =
        params.get("freeze") === "1" ||
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const controller = await createHeroEarth({
        canvas: document.querySelector("[data-earth-canvas]"),
        globe: document.querySelector("[data-earth-globe]"),
        initialRotationY: Number(params.get("ry") || "-0.12"),
        quality: params.get("quality") || "balanced",
        reducedMotion,
        settings,
        showStars: params.get("stars") === "1",
        tiltX: Number(params.get("tx") || "0.16"),
        tiltY: Number(params.get("ty") || "-0.18"),
        tiltZ: Number(params.get("tz") || "0"),
      });

      if (!controller) {
        document.querySelector("[data-fallback]").style.display = "block";
      }
    </script>
  </body>
</html>
